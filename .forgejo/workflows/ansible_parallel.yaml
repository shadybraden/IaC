name: Deploy with Ansible

on:
  workflow_dispatch:

jobs:
  Setup:
    runs-on: tools_container

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

  holmie:
    runs-on: tools_container

    steps:
      - name: Run Holmie Ansible
        run: |
          ansible-playbook playbooks/holmie.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

  holmgarage:
    runs-on: tools_container

    steps:
      - name: Run HolmGarage Ansible
        run: |
          ansible-playbook playbooks/holmgarage.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

  snow:
    runs-on: tools_container

    steps:
      - name: Run Snow Ansible
        run: |
          ansible-playbook playbooks/snow.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

  mck:
    runs-on: tools_container

    steps:
      - name: Run mck Ansible
        run: |
          ansible-playbook playbooks/mck.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

  did_fail:
    runs-on: tools_container

    steps:
      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"
