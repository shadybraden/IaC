name: Run update_upgrade Role

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target:"
        required: true
        default: ""
        type: choice
        options:
          - all
          - pi3@10.1.1.66
          - snow@100.71.213.75
          - holmgarage@100.91.217.107
          - mck@100.117.173.46
          - holmie@10.1.1.65
          - shady@10.1.1.16
      update_docker:
        type: boolean
        default: true

jobs:
  ansible-update-upgrade:
    name: "update_upgrade → ${{ github.event.inputs.target }}"
    runs-on: tools_container

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Select sudo password
        id: resolve_pass
        run: |
          if [ "${{ github.event.inputs.target }}" = "shady@10.1.1.16" ]; then
            echo "sudo_pass=${{ secrets.SHADY_SUDO_PASSWORD }}" >> $GITHUB_OUTPUT
          else
            echo "sudo_pass=${{ secrets.SUDO_PASSWORD }}" >> $GITHUB_OUTPUT
          fi

      - name: Run update_upgrade Role
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_BECOME_PASS: ${{ steps.resolve_pass.outputs.sudo_pass }}
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_DO_DOCKER_UPDATE: ${{ github.event.inputs.update_docker }}
        run: |
          ansible-playbook \
            -i inventory \
            --limit "${{ github.event.inputs.target }}" \
            playbooks/update_upgrade.yaml

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"
