name: Use buildah to make tools_container

on:
  push:
    paths:
      - '.forgejo/workflows/buildah.yaml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish - Leave blank to auto-increment.'
        required: true
        type: string
        default: '0.1.4'

jobs:
  Build-skopeo:
    runs-on: tools_container

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            echo "Using manually specified version: $INPUT_VERSION"
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Fetching latest tag from registry..."

            # Fetch tags from Forgejo container registry API
            TAGS=$(curl -s \
              "https://git.holmlab.org/api/v1/packages/shady?type=container&limit=50" \
              | jq -r '.[] | select(.name == "tools_container") | .version')

            if [ -z "$TAGS" ]; then
              echo "No existing tags found, starting at 0.0.1"
              NEW_VERSION="0.0.1"
            else
              # Sort tags as semver, pick the highest
              LATEST=$(echo "$TAGS" \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -t. -k1,1n -k2,2n -k3,3n \
                | tail -n1)

              echo "Latest version found: $LATEST"

              # Bump patch
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              PATCH=$(echo "$LATEST" | cut -d. -f3)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi

            echo "New version: $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          buildah --version
          buildah --storage-driver vfs build -f containers/Dockerfile.tools_container -t tools_container:${{ steps.version.outputs.version }} .

      - name: Push image version
        run: |
          buildah --storage-driver vfs push \
            --creds "${{ secrets.REGISTRY_USERNAME }}:${{ secrets.REGISTRY_PASSWORD }}" \
            tools_container:${{ steps.version.outputs.version }} \
            docker://git.holmlab.org/tools_container:${{ steps.version.outputs.version }}

      - name: Push image :latest
        run: |
          buildah --storage-driver vfs push \
            --creds "${{ secrets.REGISTRY_USERNAME }}:${{ secrets.REGISTRY_PASSWORD }}" \
            tools_container:${{ steps.version.outputs.version }} \
            docker://git.holmlab.org/tools_container:latest
