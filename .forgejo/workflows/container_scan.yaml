name: Scan an image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'image to scan'
        required: true
        type: string
        default: 'git.holmlab.org/shady/tools_container:0.1.28'
      show-only-fixed:
        type: boolean
        default: false

jobs:
  Grype:
    runs-on: tools_container

    steps:
      - name: Run Grype
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          echo "Running Grype on: ${{ github.event.inputs.image }}"
          echo "+"
          grype "${{ github.event.inputs.image }}" ${{ github.event.inputs.show-only-fixed && '--only-fixed' || '' }}
          echo "+"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"

  ClamAV:
    runs-on: tools_container

    steps:
      - name: Run ClamAV
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          clamscan --version
          echo "Running clamscan on: ${{ github.event.inputs.image }}"
          IMAGE="${{ github.event.inputs.image }}"
          NTFY_URL="https://ntfy.holmlab.org/transfer"
          CONTAINER_NAME="clamscan_tmp_$$"
          echo "Pulling image: $IMAGE"
          podman --storage-driver vfs pull "$IMAGE"

          echo "Creating temporary container..."
          podman --storage-driver vfs  create --name "$CONTAINER_NAME" "$IMAGE" > /dev/null

          TMPDIR=$(mktemp -d)
          echo "Exporting filesystem to $TMPDIR..."
          podman --storage-driver vfs  export "$CONTAINER_NAME" | tar -xf - -C "$TMPDIR" 2>/dev/null

          echo "Running clamscan..."
          SCAN_OUTPUT=$(clamscan -r --no-summary "$TMPDIR" 2>&1)

          echo "$SCAN_OUTPUT"
          echo ""

          INFECTED=$(echo "$SCAN_OUTPUT" | grep "FOUND" | wc -l | tr -d ' ')
          echo "Infected files found: $INFECTED"

          if [ "$INFECTED" -gt 0 ]; then
            echo "Sending ntfy alert..."
            curl -s -X POST "$NTFY_URL" \
              -H "Title: Virus Detected in Docker Image" \
              -H "Priority: urgent" \
              -H "Tags: warning,docker" \
              -d "Image: $IMAGE - $INFECTED infected file(s) found by ClamAV."
            echo "Alert sent to $NTFY_URL"
          fi

          # Cleanup
          podman --storage-driver vfs  rm "$CONTAINER_NAME" > /dev/null
          rm -rf "$TMPDIR"