name: Scan an image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'image to scan'
        required: true
        type: string
        default: 'git.holmlab.org/shady/tools_container:0.1.28'
      show-only-fixed:
        type: boolean
        default: false

jobs:
  Grype:
    runs-on: tools_container

    steps:
      - name: Run Grype
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          echo "Running Grype on: ${{ github.event.inputs.image }}"
          echo "+"
          grype "${{ github.event.inputs.image }}" ${{ github.event.inputs.show-only-fixed && '--only-fixed' || '' }}
          echo "+"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"

  ClamAV:
    runs-on: tools_container

    steps:
      - name: Run ClamAV
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          clamscan --version
