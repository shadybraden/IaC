name: Scan an image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'image to scan'
        required: true
        type: string
        default: 'git.holmlab.org/shady/tools_container:0.1.14'

jobs:
  Grype:
    runs-on: tools_container

    steps:
      - name: Run Grype
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          echo "Running Grype on: ${{ github.event.inputs.image }}"
          echo "+"
          grype "${{ github.event.inputs.image }}"
          echo "+"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"

  ClamAV:
    runs-on: tools_container

    steps:
      - name: Run ClamAV
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          echo "Running ClamScan on: ${{ github.event.inputs.image }}"

          echo "+ export image for scanning"
          TMPDIR=$(mktemp -d)

          echo "+ start docker"
          mkdir -p /var/lib/docker
          dockerd --storage-driver=vfs &>/var/log/dockerd.log &
          until docker info &>/dev/null; do sleep 1; done

          echo "+ docker create"
          container=$(docker create ${{ github.event.inputs.image }})

          echo "+ docker export:"
          docker export "$container" | tar -x -C "$TMPDIR"
          #echo "+ docker rm:"
          #docker rm "$container"

          echo "+ configure clamav"
          freshclam

          echo "+ scan image"
          clamscan -r --infected \
            --suppress-ok-results \
            --scan-archive=no \
            --scan-elf=no \
            "$TMPDIR"

          echo "+ clean up"
          rm -rf "$TMPDIR"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"
