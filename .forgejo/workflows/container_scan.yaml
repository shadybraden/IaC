name: Scan an image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'image to scan'
        required: true
        type: string
        default: 'git.holmlab.org/shady/tools_container:0.1.14'

jobs:
  Grype:
    runs-on: tools_container

    steps:
      - name: Run Grype
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          echo "Running Grype on: ${{ github.event.inputs.image }}"
          echo "+"
          grype "${{ github.event.inputs.image }}"
          echo "+"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"

  ClamAV:
    runs-on: tools_container

    steps:
      - name: Run ClamAV
        id: version
        env:
          CLICOLOR_FORCE: "1"
          TERM: xterm-256color
        run: |
          echo "Running ClamScan on: ${{ github.event.inputs.image }}"

          TMPDIR=$(mktemp -d)

          echo "+ start docker"
          mkdir -p /var/lib/docker
          dockerd --storage-driver=vfs &>/var/log/dockerd.log &
          until docker info &>/dev/null; do sleep 1; done

          echo "+ docker create & export"
          container=$(docker create ${{ github.event.inputs.image }})
          docker export "$container" | tar -x -C "$TMPDIR"
          docker rm "$container"

          echo "+ configure clamav"
          # Update signatures
          freshclam

          # Create a local whitelist for known false positives
          mkdir -p /etc/clamav/local
          cat > /etc/clamav/local/fp.ign2 << 'EOF'
          # Add signature names here as you identify false positives, e.g.:
          # Heuristics.Broken.Executable
          # PUA.Win.Packer.XmCode-1
          EOF

          echo "+ scan image"
          clamscan -r \
            --infected \
            --suppress-ok-results \
            --scan-archive=no \
            --scan-elf=no \
            --scan-pe=no \
            --scan-ole2=no \
            --scan-pdf=no \
            --scan-swf=no \
            --scan-xmldocs=no \
            --scan-hwp3=no \
            --algorithmic-detection=no \
            --detect-pua=no \
            --exclude-dir="$TMPDIR/usr/share/doc" \
            --exclude-dir="$TMPDIR/usr/lib/python3" \
            --exclude-dir="$TMPDIR/usr/lib/python3.*" \
            --exclude-dir="$TMPDIR/var/cache/apt" \
            --exclude-dir="$TMPDIR/var/lib/apt" \
            --exclude-dir="$TMPDIR/usr/share/locale" \
            --exclude-dir="$TMPDIR/usr/share/man" \
            --allowlist=/etc/clamav/local/fp.ign2 \
            "$TMPDIR"

          echo "+ clean up"
          rm -rf "$TMPDIR"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"
