name: Build tools_container on skopeo

on:
  push:
    paths:
      - '.forgejo/workflows/skopeo.yaml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish - Leave blank to auto-increment.'
        required: false
        type: string
        default: ''

jobs:
  Build-skopeo:
    runs-on: skopeo

    steps:
      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            echo "Using manually specified version: $INPUT_VERSION"
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Fetching latest tag from registry..."

            # Fetch tags from Forgejo container registry API
            TAGS=$(curl -s \
              "https://git.holmlab.org/api/v1/packages/shady?type=container&limit=50" \
              | jq -r '.[] | select(.name == "tools_container") | .version')

            if [ -z "$TAGS" ]; then
              echo "No existing tags found, starting at 0.0.1"
              NEW_VERSION="0.0.1"
            else
              # Sort tags as semver, pick the highest
              LATEST=$(echo "$TAGS" \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -t. -k1,1n -k2,2n -k3,3n \
                | tail -n1)

              echo "Latest version found: $LATEST"

              # Bump patch
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              PATCH=$(echo "$LATEST" | cut -d. -f3)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi

            echo "New version: $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi


