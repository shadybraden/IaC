name: Deploy with Ansible

on:
  push:
    branches: [main]
    paths:
      - 'roles/tv/tasks/main.yaml'
  workflow_dispatch:

jobs:

  tv:
    runs-on: tools_container

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run mck Ansible
        run: |
          ansible-playbook playbooks/tv.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_BECOME_PASS: ${{ secrets.TV_SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"
