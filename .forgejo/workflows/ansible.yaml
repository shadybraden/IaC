name: Deploy with Ansible

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run Holmie Ansible
        run: |
          ansible-playbook holmie.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"  # alternative to known_hosts
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

      - name: Run HolmGarage Ansible
        run: |
          ansible-playbook holmgarage.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"  # alternative to known_hosts
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

      - name: Run Shady Ansible
        run: |
          ansible-playbook shady.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"  # alternative to known_hosts
          ANSIBLE_BECOME_PASS: ${{ secrets.SHADY_SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/updates1Q7Mjean \
            -H "Title: Actions failed" \
            -H "Priority: low" \
            -d "Workflow ${{ github.workflow }} failed on ${{ github.ref }}"