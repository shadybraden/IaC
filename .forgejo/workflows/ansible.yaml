name: Deploy with Ansible

on:
  push:
    branches: [main]
    paths-ignore: [runner-config.yml, .forgejo/workflows/restart_actions.yaml]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: tools_container

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run Holmie Ansible
        continue-on-error: true
        run: |
          ansible-playbook playbooks/holmie.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"  # alternative to known_hosts
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

      - name: Run HolmGarage Ansible
        continue-on-error: true
        run: |
          ansible-playbook playbooks/holmgarage.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"  # alternative to known_hosts
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

      - name: Run Snow Ansible
        continue-on-error: true
        run: |
          ansible-playbook playbooks/snow.yaml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"  # alternative to known_hosts
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
          ANSIBLE_FORCE_COLOR: "1"

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST https://ntfy.holmlab.org/${{ secrets.NTFY_TOPIC }} \
            -H "Title: ‼️ Actions failed" \
            -H "Priority: low" \
            -d "Workflow '${{ github.workflow }}' failed"
