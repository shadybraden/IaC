name: Deploy with Ansible

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run Backups Ansible
        run: |
          ansible-playbook -i inventory restic_perms.yaml --limit backups
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"  # alternative to known_hosts
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
