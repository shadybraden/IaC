---
- name: Run Grype
  hosts: holmie@192.168.50.65
  become: false

  tasks:
    - name: Run grype scan on {{ lookup('ansible.builtin.env', 'IMAGE') }}
      ansible.builtin.shell:
        cmd: /home/linuxbrew/.linuxbrew/bin/grype {{ lookup('ansible.builtin.env', 'IMAGE') }} > /dev/tty
      changed_when: false
