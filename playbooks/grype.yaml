---
- name: Run Grype
  hosts: holmie@192.168.50.65
  become: false

  tasks:
    - name: grype {{ lookup('ansible.builtin.env', 'IMAGE') }}
      ansible.builtin.shell:
        cmd: /home/linuxbrew/.linuxbrew/bin/grype {{ lookup('ansible.builtin.env', 'IMAGE') }}
      changed_when: false
      environment:
        GRYPE_COLOR: "always"

    - name: Show grype scan results
      ansible.builtin.shell:
        cmd: echo "{{ grype_result.stdout }}"
      changed_when: false
