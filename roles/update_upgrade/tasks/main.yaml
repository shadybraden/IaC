# https://oneuptime.com/blog/post/2026-02-21-ansible-patch-linux-servers/view#basic-patching-playbook
---
# disable docker updates if desired
- name: Temp disable docker updates
  block:
   
  - name: Temp disable docker updates (RedHat)
    become: true
    ansible.builtin.shell: |
      dnf versionlock add docker-ce docker-ce-cli docker-ce-rootless-extras docker-compose-plugin
    when: ansible_facts["os_family"] == "RedHat"

  - name: Temp disable docker updates (Debian)
    become: true
    ansible.builtin.shell: |
      apt-mark hold docker-ce docker-ce-cli docker-ce-rootless-extras docker-compose-plugin
    when: ansible_facts["os_family"] == "Debian"

  when: lookup('env', 'ANSIBLE_DO_DOCKER_UPDATE') | lower == 'false'

# Update the package cache first
- name: Update package cache (RedHat)
  become: true
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_facts["os_family"] == "RedHat"

- name: Update package cache (Debian)
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts["os_family"] == "Debian"

# Apply all available updates
- name: Apply all updates (RedHat)
  become: true
  ansible.builtin.dnf:
    name: "*"
    state: latest
    security: "{{ security_only | default(false) }}"
  register: dnf_result
  when: ansible_facts["os_family"] == "RedHat"

- name: Apply all updates (Debian)
  become: true
  ansible.builtin.apt:
    upgrade: safe
  register: apt_result
  when: ansible_facts["os_family"] == "Debian"

# Display what was updated
- name: Show updated packages (RedHat)
  become: true
  ansible.builtin.debug:
    msg: "{{ dnf_result.changes.updated | default([]) | length }} packages updated"
  when: ansible_facts["os_family"] == "RedHat" and dnf_result is changed

- name: Show updated packages (Debian)
  become: true
  ansible.builtin.debug:
    msg: "Packages updated on {{ inventory_hostname }}"
  when: ansible_facts["os_family"] == "Debian" and apt_result is changed

# Check if a reboot is required
- name: Check if reboot is needed (RedHat)
  become: true
  ansible.builtin.command:
    cmd: needs-restarting -r
  register: reboot_check
  changed_when: false
  failed_when: false
  when: ansible_facts["os_family"] == "RedHat"

- name: Check if reboot is needed (Debian)
  become: true
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_file
  when: ansible_facts["os_family"] == "Debian"

# Flag servers that need reboot
- name: Report reboot requirement
  ansible.builtin.debug:
    msg: "REBOOT REQUIRED on {{ inventory_hostname }}"
  when: >
    (ansible_facts["os_family"] == "RedHat" and reboot_check.rc | default(0) == 1) or
    (ansible_facts["os_family"] == "Debian" and reboot_file.stat.exists | default(false))

# NTFY servers that need reboot
- name: NTFY reboot requirement
  uri:
    url: "https://ntfy.holmlab.org/updates1Q7Mjean"
    method: POST
    body: "Reboots needed:"
    headers:
      Title: "REBOOT REQUIRED on {{ inventory_hostname }}"
      Priority: "min"
  when: >
    (ansible_facts["os_family"] == "RedHat" and reboot_check.rc | default(0) == 1) or
    (ansible_facts["os_family"] == "Debian" and reboot_file.stat.exists | default(false))

# enable docker updates if desired
- name: Re-enable docker updates
  block:
   
  - name: Re-enable docker updates (RedHat)
    become: true
    ansible.builtin.shell: |
      dnf versionlock delete docker-ce docker-ce-cli docker-ce-rootless-extras docker-compose-plugin
    when: ansible_facts["os_family"] == "RedHat"

  - name: Re-enable docker updates (Debian)
    become: true
    ansible.builtin.shell: |
      apt-mark unhold docker-ce docker-ce-cli docker-ce-rootless-extras docker-compose-plugin
    when: ansible_facts["os_family"] == "Debian"

  when: lookup('env', 'ANSIBLE_DO_DOCKER_UPDATE') | lower == 'false'
