---
- name: Setup folders for hedgedoc
  block:
    - name: Set directory ownership recursively to uid/gid 1000
      become: true
      ansible.builtin.file:
        path: "/data/config_storage/hedgedoc"
        owner: 1000
        group: 1000
        recurse: true
        state: directory

    - name: Set DB directory ownership recursively to uid/gid 1000
      become: true
      ansible.builtin.file:
        path: "/data/config_storage/hedgedoc/hedgedoc_database"
        owner: 1000
        group: 1000
        recurse: true
        state: directory

    - name: Set uploads directory ownership recursively to uid/gid 1000
      become: true
      ansible.builtin.file:
        path: "/data/config_storage/hedgedoc/uploads"
        owner: 1000
        group: 1000
        recurse: true
        state: directory
