---
- name: Setup folders for radicale
  block:
    - name: Set directory ownership recursively to uid/gid 1000
      become: true
      ansible.builtin.file:
        path: "/data/config_storage/radicale"
        owner: 1000
        group: 1000
        recurse: true
        state: directory

- name: Setup files for this service
  block:
    - name: Detect if file is actually a folder
      become: true
      ansible.builtin.stat:
        path: "/data/config_storage/radicale/config/config"
      register: filemd_stat

    - name: Remove un-needed directory
      become: true
      ansible.builtin.command:
        cmd: rmdir /data/config_storage/radicale/config/config
      when: filemd_stat.stat.exists and filemd_stat.stat.isdir

    - name: Set file ownership to uid/gid 1000
      become: true
      ansible.builtin.file:
        path: "/data/config_storage/radicale/config/config"
        owner: 1000
        group: 1000
        state: touch
