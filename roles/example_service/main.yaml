---
- name: Set directory ownership recursively to uid/gid 1000
  become: true
  ansible.builtin.file:
    path: "/data/config_storage/example_service"
    owner: 1000
    group: 1000
    recurse: true
    state: directory
- name: Set file ownership recursively to uid/gid 1000
  become: true
  ansible.builtin.file:
    path: "/data/config_storage/example_service/file.md"
    owner: 1000
    group: 1000
    recurse: true
