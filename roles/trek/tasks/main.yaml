---
- name: Setup folders for trek
  block:
    - name: Set directory ownership recursively to uid/gid 1000
      become: true
      ansible.builtin.file:
        path: "/data/config_storage/trek/data"
        owner: 1000
        group: 1000
        recurse: true
        state: directory
    - name: Set directory ownership recursively to uid/gid 1000
      become: true
      ansible.builtin.file:
        path: "/data/config_storage/trek/uploads"
        owner: 1000
        group: 1000
        recurse: true
        state: directory
