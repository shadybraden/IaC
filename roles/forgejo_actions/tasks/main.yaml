---
- name: Set file permissions for token file
  become: true
  ansible.builtin.file:
    state: touch
    path: /data/config_storage/forgejo-action/forgejo_actions_token.txt
    owner: 1001
    group: 1001
    mode: '0600'

- name: Set file permissions for data dir
  become: true
  ansible.builtin.file:
    state: directory
    path: /data/config_storage/forgejo-action/data/.cache
    owner: 1001
    group: 1001
    mode: '0775'

- name: Ensure data/.cache directory exists with setgid bit
  become: true
  ansible.builtin.file:
    path: /data/config_storage/forgejo-action/data/.cache
    state: directory
    owner: 1001
    group: 1001
    mode: '2775'

- name: Ensure ownership is recursive for data
  become: true
  ansible.builtin.file:
    path: /data/config_storage/forgejo-action/data
    recurse: yes
    owner: 1001
    group: 1001
    state: directory
