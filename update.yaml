---
- hosts: all
  become: yes
  tasks:
    - name: Run apt update
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      register: did_update

    - name: Get hostname
      command: hostname
      register: hostname_output

    - name: Send ntfy notification
      uri:
        url: "https://ntfy.holmlab.org/updates1Q7Mjean"
        method: POST
        body: "{{ did_update.stdout }}"
        headers:
          Title: "updates ran on {{ hostname_output.stdout }}"
          Priority: "min"
      when: did_update.stdout is defined
